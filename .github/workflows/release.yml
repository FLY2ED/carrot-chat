name: Release

# On every push to main, Changesets opens (or updates) a "Version Packages" PR;
# merging that PR publishes the changed packages to npm.
#
# DISABLED until publishing is bootstrapped. To enable, set the repo variable
# RELEASE_ENABLED=true (Settings → Secrets and variables → Actions → Variables)
# AFTER doing the one-time setup:
#   1. Allow Actions to open PRs: Settings → Actions → General → Workflow
#      permissions → check "Allow GitHub Actions to create and approve pull requests".
#   2. Publish each package ONCE manually so the name exists on npm (works around
#      the scoped + Trusted-Publishing first-publish E404):
#        pnpm --filter @naldadev/chat publish --access public --provenance
#        pnpm --filter @naldadev/chat-react publish --access public --provenance
#   3. On npmjs.com, add this repo + this workflow as a Trusted Publisher per pkg.
# After that this workflow versions + publishes automatically with provenance.
on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # OIDC for npm Trusted Publishing / provenance

jobs:
  release:
    # Skipped (green) until the maintainer bootstraps publishing — see header.
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
